<!DOCTYPE html>
<html data-type="example" data-id="sequence-camera" style='background-color:White;'>
  <head>
    <title>Baofeng Radio</title>
    <meta charset='utf-8' content='text/html' http-equiv='Content-type' />

    <script src='jquery-1.9.1.min.js' type='text/javascript'></script>
    
    <script src='jquery.reel.withzoom.js' type='text/javascript'></script>
	<script src='jquery.mousewheel.min.js' type='text/javascript'></script>
	<script src="jquery-ui.custom.min.js" type="text/javascript"></script>

    <!-- Common examples style (gray background, thin fonts etc.) -->
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body style='background-color:White;'>
    <h1>Baofeng Radio</h1>

    <img id="image" src='images/image_01.jpg' width="1000" height="667" />
    <script>
      $(function(){ // when DOM ready

      $('#image').reel({
      images:		'images/image_##.jpg|01..30',
      zoomimages:	['images/zoom_image_01.jpg','images/zoom_image_02.jpg','images/zoom_image_03.jpg','images/zoom_image_04.jpg','images/zoom_image_05.jpg','images/zoom_image_06.jpg','images/zoom_image_07.jpg','images/zoom_image_08.jpg','images/zoom_image_09.jpg','images/zoom_image_10.jpg','images/zoom_image_11.jpg','images/zoom_image_12.jpg','images/zoom_image_13.jpg','images/zoom_image_14.jpg','images/zoom_image_15.jpg','images/zoom_image_16.jpg','images/zoom_image_17.jpg','images/zoom_image_18.jpg','images/zoom_image_19.jpg','images/zoom_image_20.jpg','images/zoom_image_21.jpg','images/zoom_image_22.jpg','images/zoom_image_23.jpg','images/zoom_image_24.jpg','images/zoom_image_25.jpg','images/zoom_image_26.jpg','images/zoom_image_27.jpg','images/zoom_image_28.jpg','images/zoom_image_29.jpg','images/zoom_image_30.jpg'],
      zoomwidth:	2000, // Zoom image width
      zoomheight:	1334, // Zoom image height
      loops:         true,
      frame:        1,

      responsive:   false,
      speed:        0,
      tempo:        25,

      brake:        0.23,
      delay:        0,

      indicator:    0,

      opening:      0,

      rebound:      0.5,

      timeout:      2,
      velocity:     0,

      clickfree:    false,
      shy:          false,
      cw:           true,
      draggable:    true,

      steppable:    true,
      throwable:    true,
      vertical:     false,

      cursor:       undefined,
      });

      });
    </script>

    <p class="credits photo"></p>

    <div class="ballast">this is a radio station of Baofeng</div>
  </body>
</html>
